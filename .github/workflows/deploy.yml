name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Verify
        run: ./verify.sh

      - name: Deploy
        env:
          SSH_PRIVATE_KEY_CONTENT: ${{ secrets.SSH_PRIVATE_KEY }}
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          if [[ -z "$SSH_PRIVATE_KEY_CONTENT" ]]; then
            echo "ERROR: SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          key_file="$RUNNER_TEMP/deploy-key"
          printf '%s\n' "$SSH_PRIVATE_KEY_CONTENT" > "$key_file"
          chmod 600 "$key_file"

          # Write .env.production.local on the server
          if [[ -n "$ENV_FILE_CONTENT" ]]; then
            printf '%s\n' "$ENV_FILE_CONTENT" | \
              ssh -i "$key_file" -o StrictHostKeyChecking=accept-new root@vps3.marekventur.com \
              "cat > /var/www/wortopia-new/.env.production.local"
          fi

          ./deploy.sh "$key_file"
          # Key file is on ephemeral runner; no need to delete
