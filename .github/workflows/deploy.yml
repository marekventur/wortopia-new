name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Verify
        run: ./verify.sh

      - name: Deploy
        env:
          SSH_PRIVATE_KEY_CONTENT: ${{ secrets.SSH_PRIVATE_KEY }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          MAILGUN_FROM: ${{ secrets.MAILGUN_FROM }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          GUEST_TOKEN_SECRET: ${{ secrets.GUEST_TOKEN_SECRET }}
          RESET_TOKEN_SECRET: ${{ secrets.RESET_TOKEN_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          DATABASE_PATH: ${{ secrets.DATABASE_PATH }}
        run: |
          if [[ -z "$SSH_PRIVATE_KEY_CONTENT" ]]; then
            echo "ERROR: SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          key_file="$RUNNER_TEMP/deploy-key"
          printf '%s\n' "$SSH_PRIVATE_KEY_CONTENT" > "$key_file"
          chmod 600 "$key_file"

          # Write .env.production.local on the server via a temp file
          env_file="$RUNNER_TEMP/env.production.local"
          printf 'COOKIE_SECRET=%s\nGUEST_TOKEN_SECRET=%s\nRESET_TOKEN_SECRET=%s\nMAILGUN_API_KEY=%s\nMAILGUN_DOMAIN=%s\nMAILGUN_FROM=%s\nSITE_URL=%s\nDATABASE_PATH=%s\n' \
            "$COOKIE_SECRET" "$GUEST_TOKEN_SECRET" "$RESET_TOKEN_SECRET" \
            "$MAILGUN_API_KEY" "$MAILGUN_DOMAIN" "$MAILGUN_FROM" \
            "$SITE_URL" "$DATABASE_PATH" > "$env_file"
          scp -i "$key_file" -o StrictHostKeyChecking=accept-new \
            "$env_file" root@vps3.marekventur.com:/var/www/wortopia-new/.env.production.local

          ./deploy.sh "$key_file"
          # Key file is on ephemeral runner; no need to delete
