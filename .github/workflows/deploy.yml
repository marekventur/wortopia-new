name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Verify
        run: ./verify.sh

      - name: Deploy
        env:
          SSH_PRIVATE_KEY_CONTENT: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "$SSH_PRIVATE_KEY_CONTENT" ]]; then
            echo "ERROR: SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          key_file="$RUNNER_TEMP/deploy-key"
          printf '%s\n' "$SSH_PRIVATE_KEY_CONTENT" > "$key_file"
          chmod 600 "$key_file"
          ./deploy.sh "$key_file"
          # Key file is on ephemeral runner; no need to delete
